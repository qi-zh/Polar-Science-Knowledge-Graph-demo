services:
  neo4j:
    image: neo4j:5.26.0-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-demo-password}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-demo-password} 'RETURN 1;' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
    volumes:
      - neo4j_data:/data

  app:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-demo-password}
      NEO4J_DATABASE: neo4j
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    command: ["python", "main.py", "--mode", "frozen", "--reset-db"]

volumes:
  neo4j_data:
